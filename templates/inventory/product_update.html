{% extends '../layout.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}

<div class="content-section">
    {{ form.media }}
    <form method="POST">
         <fieldset>
             <legend class="border-bottom pd-2 mb-4 text-right text-success">Product Update</legend>
             {% csrf_token %}
             <div class="form-group text-white">
                {{ form|crispy }}
             </div>
             <div class="form-group pt-4 text-white">
                   <button class="btn btn-outline-light text-success" type="submit">Update Products</button>
             </div>
         </fieldset>
    </form>
</div>
     
{% endblock %}
