{% extends '../layout.html' %}

{% load static %}

{% block content %}
<div class="content-section">
    <div class="text-success">
        <h2>Dashboard</h2>
    </div>
    <legend class="border-bottom pd-2 mb-4"></legend>
    <div class="card m-4" style="width: 90%;">
        <div class="card-body">
            <div id="chart1"></div>
        </div>
    </div>

    <div class="card m-4" style="width: 90%;">
        <div class="card-body">
            <div id="chart2"></div>
        </div>
    </div>

    <div class="card m-4" style="width: 90%;">
        <div class="card-body">
            <div id="chart3"></div>
        </div>
    </div>
    
</div>
     <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
     <script type="text/javascript">
        var graph1 = {{ sales_graph| safe }}
        Plotly.plot("chart1", graph1, {})

        var graph2 = {{ best_selling_product| safe }}
        Plotly.plot("chart2", graph2, {})

        var graph3 = {{ most_product_in_stock| safe }}
        Plotly.plot("chart3", graph3, {})
     </script>
{% endblock %}
